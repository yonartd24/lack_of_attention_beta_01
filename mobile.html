<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Mobile - Brain Drain</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --c-green: #1ad872; --c-red: #f9432d; --c-yellow: #efd828; --c-blue: #27a4e4; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: "Helvetica Neue", Arial, sans-serif; background-color: #1a1a1a; color: white; overflow: hidden; }
        .screen { display: none; height: 100vh; width: 100vw; justify-content: center; align-items: center; flex-direction: column; text-align: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        .dynamic-btn { display: flex; align-items: center; background: var(--c-green); padding: 10px 30px; border-radius: 50px; width: 80%; margin-top: 30px; }
        .dynamic-btn input { background: transparent; border: none; color: black; font-size: 1.5rem; font-weight: bold; width: 100%; outline: none; }
        .menu-btn { background: white; color: black; border: none; padding: 20px; font-size: 1.5rem; font-weight: bold; border-radius: 30px; margin-top: 15px; width: 80%; text-transform: uppercase; }
        #game-grid { display: none; height: 100vh; width: 100vw; flex-wrap: wrap; }
        .color-btn { width: 50%; height: 50vh; border: none; }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active" style="background: black;">
        <div class="dynamic-btn" id="nick-container">
            <input type="text" id="nickname-input" placeholder="NICKNAME" maxlength="12" />
            <button onclick="joinGame()" style="background: white; border-radius: 50%; border: none; width: 40px; height: 40px; font-weight: bold;">→</button>
        </div>
    </div>

    <div id="screen-start" class="screen" style="background: black;">
        <h2 id="player-name-display">PLAYER</h2>
        <button class="menu-btn" style="background: transparent; color: white; border: 3px solid white;" onclick="startGame()">START</button>
    </div>

    <div id="game-grid">
        <button class="color-btn" style="background: var(--c-green)" onclick="sendTap('#1ad872')"></button>
        <button class="color-btn" style="background: var(--c-red)" onclick="sendTap('#f9432d')"></button>
        <button class="color-btn" style="background: var(--c-yellow)" onclick="sendTap('#efd828')"></button>
        <button class="color-btn" style="background: var(--c-blue)" onclick="sendTap('#27a4e4')"></button>
    </div>

    <div id="screen-gameover" class="screen" style="background: black;">
        <h1 style="color: var(--c-red); font-size: 4rem;">YOU LOSE</h1>
        <button class="menu-btn" style="background: var(--c-green)" onclick="startGame()">TRY AGAIN</button>
        <button class="menu-btn" onclick="requestScoreboard()">SCOREBOARD</button>
        <button class="menu-btn" style="background: var(--c-yellow)" onclick="exitGame()">EXIT</button>
    </div>

    <div id="screen-rank" class="screen" style="background: black;">
        <h2 style="color: var(--c-red); font-size: 3rem;">YOU ARE</h2>
        <h1 id="rank-display" style="color: var(--c-red); font-size: 5rem;">#--</h1>
        <button class="menu-btn" onclick="startGame()">TRY AGAIN</button>
        <button class="menu-btn" style="background: var(--c-yellow)" onclick="exitGame()">EXIT</button>
    </div>

    <script>
        const myId = Math.random().toString(36).substring(7);
        const supabaseUrl = "https://hpmmzyfxchqlazxkbrym.supabase.co";
        const supabaseKey = "sb_publishable_z7XELKJhbVvNwnB1iIJq9g_7-CvO-rb";
        const clienteSupabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        const channel = clienteSupabase.channel("simon-sync");

        function showScreen(id) {
            document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
            document.getElementById("game-grid").style.display = (id === "game-grid") ? "flex" : "none";
            if (id !== "game-grid") document.getElementById(id).classList.add("active");
        }

        function joinGame() {
            const name = document.getElementById("nickname-input").value.trim() || "ANON";
            document.getElementById("player-name-display").innerText = name.toUpperCase();
            channel.send({ type: "broadcast", event: "mobile-action", payload: { action: "JOIN", value: name, id: myId } });
            showScreen("screen-start");
        }

        function startGame() { channel.send({ type: "broadcast", event: "mobile-action", payload: { action: "START", id: myId } }); }
        function requestScoreboard() { channel.send({ type: "broadcast", event: "mobile-action", payload: { action: "SCOREBOARD_REQ", id: myId } }); showScreen("screen-rank"); }
        function exitGame() { channel.send({ type: "broadcast", event: "mobile-action", payload: { action: "EXIT", id: myId } }); location.reload(); }

        let lastTap = 0;
        function sendTap(color) {
            const now = Date.now();
            if (now - lastTap < 500) return; // BLOQUEO 0.5s
            lastTap = now;
            channel.send({ type: "broadcast", event: "mobile-action", payload: { action: "TAP", value: color, id: myId } });
        }

        channel.on("broadcast", { event: "tv-state" }, (data) => {
            const { state, rank } = data.payload;
            if (state === "PLAY") showScreen("game-grid");
            else if (state === "GAMEOVER") { document.getElementById("rank-display").innerText = "#" + rank; showScreen("screen-gameover"); }
            else if (state === "WATCH" || state === "BLOCKED") { /* Solo mirar tele */ }
        }).subscribe();
    </script>
</body>
</html>
