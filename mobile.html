<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Mobile - Brain Drain</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --c-green: #1ad872; 
            --c-red: #f9432d; 
            --c-yellow: #efd828; 
            --c-blue: #27a4e4; 
        }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: "Helvetica Neue", Arial, sans-serif; overflow: hidden; background-color: #1a1a1a; color: white; -webkit-touch-callout: none; -webkit-user-select: none; }
        
        .screen { display: none; height: 100vh; width: 100vw; justify-content: center; align-items: center; flex-direction: column; text-align: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }

        /* Nickname / Buttons */
        .dynamic-btn { display: flex; align-items: center; justify-content: space-between; background: var(--c-green); padding: 10px 10px 10px 30px; border-radius: 50px; width: 80%; transition: background-color 0.5s; margin-top: 30px; }
        .dynamic-btn input { background: transparent; border: none; color: black; font-size: 1.5rem; font-weight: bold; width: 70%; outline: none; }
        .dynamic-btn input::placeholder { color: rgba(0,0,0,0.5); }
        .circle-btn { background: white; color: black; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 1.5rem; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: bold; }
        
        /* Menu Buttons (Color exacto del PDF) */
        .menu-btn { background: white; color: black; border: none; padding: 20px; font-size: 1.5rem; font-weight: bold; border-radius: 30px; margin-top: 15px; width: 80%; cursor: pointer; text-transform: uppercase; }
        .menu-btn.green { background: var(--c-green); color: black; }
        .menu-btn.blue { background: var(--c-blue); color: white; }
        .menu-btn.yellow { background: var(--c-yellow); color: black; }

        .arrow-up { font-size: 5rem; animation: bounceUp 1.5s ease-in-out infinite; margin-bottom: 20px; color: white; }
        @keyframes bounceUp { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* Game Grid */
        #game-grid { display: none; height: 100vh; width: 100vw; flex-wrap: wrap; }
        .color-btn { width: 50%; height: 50vh; border: none; position: relative; outline: none; transition: opacity 0.1s; }
        .color-btn:active { opacity: 0.5; }
        #btn-green { background-color: var(--c-green); order: 1; }
        #btn-red { background-color: var(--c-red); order: 2; }
        #btn-yellow { background-color: var(--c-yellow); order: 3; }
        #btn-blue { background-color: var(--c-blue); order: 4; }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active" style="background: black;">
        <div class="dynamic-btn" id="nick-container">
            <input type="text" id="nickname-input" placeholder="Nickname" maxlength="12" />
            <button class="circle-btn" onclick="joinGame()">→</button>
        </div>
        <p id="status-msg" style="color: #aaa; margin-top: 20px;">Waiting for server...</p>
    </div>

    <div id="screen-start" class="screen" style="background: black;">
        <h2 id="player-name-display" style="font-size: 2.5rem; color: white;">Player name</h2>
        <button class="menu-btn" style="background: transparent; color: white; border: 3px solid white; margin-top: 50px;" onclick="startGame()">START</button>
    </div>

    <div id="screen-block" class="screen" style="background-color: #000; z-index: 200">
        <div class="arrow-up">↑</div>
        <h1 id="block-title" style="color: var(--c-red); font-size: 4rem; margin: 0; line-height: 1;">MEMORIZE!</h1>
        <p id="block-desc" style="font-size: 1.5rem; color: white; margin-top: 10px;">Remember the path</p>
    </div>

    <div id="game-grid">
        <button class="color-btn" id="btn-green" onclick="sendTap('#1ad872')"></button>
        <button class="color-btn" id="btn-red" onclick="sendTap('#f9432d')"></button>
        <button class="color-btn" id="btn-yellow" onclick="sendTap('#efd828')"></button>
        <button class="color-btn" id="btn-blue" onclick="sendTap('#27a4e4')"></button>
    </div>

    <div id="screen-gameover" class="screen" style="background: black; justify-content: flex-start; padding-top: 20%;">
        <h1 style="color: var(--c-red); font-size: 5rem; margin-bottom: 40px; line-height: 1; margin-top: 0;">YOU<br>LOSE</h1>
        <button class="menu-btn green" onclick="requestMenu('EXTRA_INFO_REQ')">EXTRA INFO</button>
        <button class="menu-btn blue" onclick="startGame()">TRY AGAIN</button>
        <button class="menu-btn yellow" style="margin-top: 40px;" onclick="exitGame()">EXIT</button>
    </div>

    <div id="screen-rank" class="screen" style="background: black; justify-content: flex-start; padding-top: 20%;">
        <h2 style="color: var(--c-red); font-size: 4rem; margin-bottom: 0;">YOU'RE</h2>
        <h2 style="color: var(--c-red); font-size: 4rem; margin-top: 0; margin-bottom: 40px;">THE #8</h2>
        <button class="menu-btn green" onclick="requestMenu('EXTRA_INFO_REQ')">EXTRA INFO</button>
        <button class="menu-btn blue" onclick="startGame()">TRY AGAIN</button>
        <button class="menu-btn yellow" style="margin-top: 40px;" onclick="exitGame()">EXIT</button>
    </div>

    <script>
        const colors = ['#1ad872', '#f9432d', '#efd828', '#27a4e4'];
        let colorIdx = 0;
        setInterval(() => {
            if(document.getElementById('screen-login').classList.contains('active')) {
                colorIdx = (colorIdx + 1) % colors.length;
                document.getElementById('nick-container').style.backgroundColor = colors[colorIdx];
            }
        }, 2000);

        const supabaseUrl = "https://hpmmzyfxchqlazxkbrym.supabase.co";
        const supabaseKey = "sb_publishable_z7XELKJhbVvNwnB1iIJq9g_7-CvO-rb";
        const clienteSupabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        const channel = clienteSupabase.channel("simon-sync");

        function showScreen(id) {
            document.querySelectorAll(".screen").forEach((s) => s.classList.remove("active"));
            document.getElementById("game-grid").style.display = "none";

            if (id === "game-grid") {
                document.getElementById(id).style.display = "flex";
            } else {
                document.getElementById(id).classList.add("active");
            }
        }

        function joinGame() {
            const name = document.getElementById("nickname-input").value.trim() || "Player";
            document.getElementById("player-name-display").innerText = name;
            
            // Envía el nombre a la TV
            channel.send({ type: "broadcast", event: "mobile-action", payload: { action: "JOIN", value: name } });
            showScreen("screen-start");
        }

        function startGame() {
            channel.send({ type: "broadcast", event: "mobile-action", payload: { action: "START" } });
        }

        function requestMenu(actionType) {
            channel.send({ type: "broadcast", event: "mobile-action", payload: { action: actionType } });
            if(actionType === 'SCOREBOARD_REQ') showScreen("screen-rank");
        }

        let ultimoToque = 0;
        function sendTap(hex) {
            const ahora = Date.now();
            // BLOQUEO DE 500ms
            if (ahora - ultimoToque < 500) return;
            ultimoToque = ahora;

            channel.send({ type: "broadcast", event: "mobile-action", payload: { action: "TAP", value: hex } });
        }

        function exitGame() {
            channel.send({ type: "broadcast", event: "mobile-action", payload: { action: "EXIT" } });
            location.reload();
        }

        channel
            .on("broadcast", { event: "tv-state" }, (data) => {
                const state = data.payload.state;
                if (state === "BLOCKED") {
                    document.getElementById("block-title").innerText = "LOOK AT\nTHE TV";
                    document.getElementById("block-desc").innerText = "Read the fact";
                    showScreen("screen-block");
                } else if (state === "WATCH") {
                    document.getElementById("block-title").innerText = "MEMORIZE!";
                    document.getElementById("block-desc").innerText = "Remember the path";
                    showScreen("screen-block");
                } else if (state === "PLAY") {
                    showScreen("game-grid");
                } else if (state === "GAMEOVER") {
                    showScreen("screen-gameover");
                }
            })
            .subscribe((status) => {
                if (status === "SUBSCRIBED") {
                    document.getElementById("status-msg").innerText = "Connected!";
                    document.getElementById("status-msg").style.color = "var(--c-green)";
                }
            });
    </script>
</body>
</html>
