<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV - Brain Drain</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --c-green: #1ad872;
            --c-red: #f9432d;
            --c-yellow: #efd828;
            --c-blue: #27a4e4;
        }

        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; background-color: #1a1a1a; color: white; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .screen { display: none; width: 100%; height: 100%; padding: 50px; box-sizing: border-box; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .active { display: flex; }
        
        .title-text { font-size: 6rem; margin: 0; font-weight: 900; text-transform: uppercase; }
        .subtitle-text { font-size: 3rem; margin-top: 10px; font-weight: bold; }
        
        .bouncing-arrow { font-size: 5rem; animation: bounce 1.5s ease-in-out infinite; margin-top: 40px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(30px); } }

        /* JUEGO SIMON */
        #simon-board { display: none; grid-template-columns: 1fr 1fr; width: 80vh; height: 80vh; gap: 20px; position: relative; }
        .simon-color { border-radius: 30px; opacity: 0.2; transition: all 0.2s ease; }
        .simon-color.highlight { opacity: 1; transform: scale(1.02); }
        
        #tv-green { background-color: var(--c-green); } #tv-green.highlight { box-shadow: 0 0 60px var(--c-green), inset 0 0 30px white; }
        #tv-red { background-color: var(--c-red); } #tv-red.highlight { box-shadow: 0 0 60px var(--c-red), inset 0 0 30px white; }
        #tv-yellow { background-color: var(--c-yellow); } #tv-yellow.highlight { box-shadow: 0 0 60px var(--c-yellow), inset 0 0 30px white; }
        #tv-blue { background-color: var(--c-blue); } #tv-blue.highlight { box-shadow: 0 0 60px var(--c-blue), inset 0 0 30px white; }
        
        #center-counter { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 6rem; font-weight: bold; color: white; text-shadow: 0 0 30px rgba(0,0,0,0.9); z-index: 10; display: none; }

        /* FACTS */
        #fact-container { background: var(--c-red); padding: 60px; border-radius: 30px; max-width: 80%; z-index: 50; display: none; color: black; text-align: center; }
        #fact-text { font-size: 3rem; line-height: 1.2; font-weight: bold; margin-bottom: 40px; }
        #tv-timer { font-size: 4rem; font-weight: 900; background: white; border-radius: 20px; border: 4px solid black; padding: 10px 40px; display: inline-block; }
        
        /* SCOREBOARD CENTRADO */
        #scoreboard-container { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(2, 1fr); gap: 2px; background-color: var(--c-red); width: 100%; height: 70vh; margin-top: 20px; }
        .sb-cell { background-color: black; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        .sb-number { font-size: 5rem; font-weight: 900; margin: 0; }
        .sb-name { font-size: 1.5rem; color: white; margin-top: 10px; text-transform: uppercase; font-weight: bold; }

        /* OVERLAY AUDIO */
        #audio-overlay { position: fixed; top:0; left:0; width: 100vw; height: 100vh; background: black; z-index: 9999; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

    <audio id="snd-bg" src="sounds/waiting_room_song.mp3" loop preload="auto"></audio>
    <audio id="snd-color" src="sounds/sound_1.mp3" preload="auto"></audio>
    <audio id="snd-start" src="sounds/sound_2.mp3" preload="auto"></audio>
    <audio id="snd-fact" src="sounds/sound_4.mp3" preload="auto"></audio>

    <div id="audio-overlay" onclick="initExperience()">
        <h1 style="color: white; border: 2px solid white; padding: 20px; border-radius: 20px;">CLICK ONCE TO START SYSTEM</h1>
    </div>

    <div id="screen-idle" class="screen">
        <h1 class="title-text">ATTENTION TEST</h1>
        <p class="subtitle-text">SCAN TO START</p>
        <div class="bouncing-arrow">↓</div>
    </div>

    <div id="screen-ready" class="screen" style="background: black;">
        <p class="subtitle-text" id="tv-player-name">PLAYER</p>
        <h1 class="title-text" id="text-player-ready">IS READY TO PLAY</h1>
    </div>

    <div id="screen-game" class="screen" style="background: black; flex-direction: row;">
        <div id="simon-board">
            <div id="tv-green" class="simon-color"></div>
            <div id="tv-red" class="simon-color"></div>
            <div id="tv-yellow" class="simon-color"></div>
            <div id="tv-blue" class="simon-color"></div>
            <div id="center-counter">0</div>
        </div>
        <div id="fact-container">
            <div id="fact-text">Did you know?</div>
            <div id="tv-timer">5</div>
        </div>
    </div>

    <div id="screen-gameover" class="screen" style="background: black; align-items: center; padding-left: 0;">
        <h1 style="color: var(--c-red); font-size: 5rem; margin-bottom: 40px;">YOU LOSE</h1>
        <div style="font-size: 2.5rem; font-weight: bold;">ATTENTION TIME: <span id="res-time" style="color:#888;">0:00</span></div>
        <div style="font-size: 2.5rem; font-weight: bold;">COLORS MEMORIZED: <span id="res-colors" style="color:#888;">0</span></div>
        <div style="font-size: 2.5rem; font-weight: bold;">FACTS READ: <span id="res-facts" style="color:#888;">0</span></div>
    </div>

    <div id="screen-scoreboard" class="screen" style="padding: 50px;">
        <h1 style="color: white; margin-bottom: 20px;">SCOREBOARD</h1>
        <div id="scoreboard-container">
            </div>
    </div>

    <script>
        const sndBg = document.getElementById('snd-bg');
        const sndColor = document.getElementById('snd-color');
        const sndStart = document.getElementById('snd-start');
        const sndFact = document.getElementById('snd-fact');

        function initExperience() {
            document.getElementById('audio-overlay').style.display = 'none';
            sndBg.play().catch(e => {});
            showScreen('screen-idle');
        }

        const supabaseUrl = "https://hpmmzyfxchqlazxkbrym.supabase.co";
        const supabaseKey = "sb_publishable_z7XELKJhbVvNwnB1iIJq9g_7-CvO-rb";
        const clienteSupabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        const channel = clienteSupabase.channel("simon-sync").subscribe();

        let activePlayer = null;
        let sequence = [];
        let playerStep = 0;
        let level = 0;
        let factsSeen = 0;
        let startTime = 0;
        let isPlaying = false;
        const colors = ['#1ad872', '#f9432d', '#efd828', '#27a4e4'];
        const colorIds = { '#1ad872': 'tv-green', '#f9432d': 'tv-red', '#efd828': 'tv-yellow', '#27a4e4': 'tv-blue' };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('simon-board').style.display = (id === 'screen-game') ? 'grid' : 'none';
        }

        channel.on("broadcast", { event: "mobile-action" }, async (data) => {
            const { action, value, id: senderId } = data.payload;

            if (action === "JOIN") {
                activePlayer = { id: senderId, name: value };
                sndBg.pause();
                document.getElementById('tv-player-name').innerText = value.toUpperCase();
                showScreen('screen-ready');
            } else if (activePlayer && senderId === activePlayer.id) {
                if (action === "START" || action === "TRY_AGAIN") {
                    sndStart.currentTime = 0; sndStart.play().catch(e=>{});
                    startGame();
                } else if (action === "TAP" && isPlaying) {
                    checkPlayerInput(value);
                } else if (action === "SCOREBOARD_REQ") {
                    await updateScoreboardUI();
                    showScreen('screen-scoreboard');
                } else if (action === "EXIT") {
                    resetToIdle();
                }
            }
        });

        async function updateScoreboardUI() {
            const { data } = await clienteSupabase.from('nations_scores').select('*').order('score', { ascending: false }).limit(10);
            const container = document.getElementById('scoreboard-container');
            container.innerHTML = '';
            
            const cellColors = [colors[0], colors[1], colors[3]]; // Verde, Rojo, Azul para los top 3
            
            for (let i = 0; i < 10; i++) {
                const player = data && data[i] ? data[i] : { nickname: '---', score: 0 };
                const numColor = i < 3 ? cellColors[i] : 'white';
                container.innerHTML += `
                    <div class="sb-cell">
                        <h2 class="sb-number" style="color: ${numColor}">#${i+1}</h2>
                        <p class="sb-name">${player.nickname}</p>
                    </div>`;
            }
        }

        function startGame() {
            showScreen('screen-game');
            sequence = []; level = 0; factsSeen = 0; startTime = Date.now();
            setTimeout(nextRound, 1500);
        }

        function nextRound() {
            level++; playerStep = 0;
            sequence.push(colors[Math.floor(Math.random() * colors.length)]);
            isPlaying = false;
            document.getElementById('center-counter').style.display = 'none';

            let showFact = (level > 1 && level <= 6) || (level > 6 && level % 5 === 0);
            if (showFact) { factsSeen++; displayFact(); } 
            else { setTimeout(playSequence, 500); }
        }

        function displayFact() {
            const factBox = document.getElementById("fact-container");
            factBox.style.backgroundColor = sequence[sequence.length - 1];
            document.getElementById("fact-text").innerText = facts[Math.floor(Math.random() * facts.length)];
            document.getElementById('simon-board').style.display = 'none';
            factBox.style.display = "block";
            sndFact.currentTime = 0; sndFact.play().catch(e=>{});
            
            let timeLeft = 5;
            document.getElementById("tv-timer").innerText = timeLeft;
            const timer = setInterval(() => {
                timeLeft--;
                document.getElementById("tv-timer").innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    factBox.style.display = "none";
                    document.getElementById('simon-board').style.display = 'grid';
                    playSequence();
                }
            }, 1000);
        }

        function playSequence() {
            channel.send({ type: "broadcast", event: "tv-state", payload: { state: "WATCH" } });
            let i = 0;
            const interval = setInterval(() => {
                highlightColor(sequence[i]);
                i++;
                if (i >= sequence.length) {
                    clearInterval(interval);
                    setTimeout(() => {
                        isPlaying = true;
                        document.getElementById('center-counter').innerText = sequence.length;
                        document.getElementById('center-counter').style.display = 'block';
                        channel.send({ type: "broadcast", event: "tv-state", payload: { state: "PLAY" } });
                    }, 500);
                }
            }, 800);
        }

        function highlightColor(hex) {
            const el = document.getElementById(colorIds[hex]);
            sndColor.currentTime = 0; sndColor.play().catch(e=>{});
            el.classList.add("highlight");
            setTimeout(() => el.classList.remove("highlight"), 300);
        }

        async function checkPlayerInput(color) {
            highlightColor(color);
            if (color === sequence[playerStep]) {
                playerStep++;
                document.getElementById('center-counter').innerText = sequence.length - playerStep;
                if (playerStep === sequence.length) {
                    isPlaying = false;
                    setTimeout(nextRound, 800);
                }
            } else { await gameOver(); }
        }

        async function gameOver() {
            isPlaying = false;
            const score = level - 1;
            const totalSecs = Math.floor((Date.now() - startTime) / 1000);
            
            // GUARDAR EN SUPABASE
            await clienteSupabase.from('nations_scores').insert([{ nickname: activePlayer.name, score: score }]);
            
            // CALCULAR RANGO REAL
            const { count } = await clienteSupabase.from('nations_scores').select('*', { count: 'exact', head: true }).gt('score', score);
            const myRank = (count || 0) + 1;

            document.getElementById("res-time").innerText = `${Math.floor(totalSecs/60)}:${(totalSecs%60).toString().padStart(2,'0')}`;
            document.getElementById("res-colors").innerText = score;
            document.getElementById("res-facts").innerText = factsSeen;
            showScreen('screen-gameover');
            
            channel.send({ type: "broadcast", event: "tv-state", payload: { state: "GAMEOVER", rank: myRank } });
        }

        function resetToIdle() {
            activePlayer = null;
            showScreen('screen-idle');
            sndBg.play().catch(e=>{});
        }
    </script>
</body>
</html>
