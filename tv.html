<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV - Brain Drain</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --c-green: #1ad872;
            --c-red: #f9432d;
            --c-yellow: #efd828;
            --c-blue: #27a4e4;
        }

        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; background-color: #1a1a1a; color: white; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; transition: background-color 0.5s; }
        .screen { display: none; width: 100%; height: 100%; padding: 50px; box-sizing: border-box; flex-direction: column; justify-content: center; align-items: center; }
        .active { display: flex; }
        
        .title-text { font-size: 6rem; margin: 0; font-weight: 900; text-transform: uppercase; text-align: center; }
        .subtitle-text { font-size: 3rem; margin-top: 10px; font-weight: bold; text-align: center; }
        
        .bouncing-arrow { font-size: 5rem; animation: bounce 1.5s ease-in-out infinite; margin-top: 40px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(30px); } }

        /* JUEGO SIMON */
        #simon-board { display: none; grid-template-columns: 1fr 1fr; width: 80vh; height: 80vh; gap: 20px; position: relative; }
        .simon-color { border-radius: 30px; opacity: 0.2; transition: all 0.2s ease; }
        .simon-color.highlight { opacity: 1; transform: scale(1.02); }
        
        #tv-green { background-color: var(--c-green); } #tv-green.highlight { box-shadow: 0 0 60px var(--c-green), inset 0 0 30px white; }
        #tv-red { background-color: var(--c-red); } #tv-red.highlight { box-shadow: 0 0 60px var(--c-red), inset 0 0 30px white; }
        #tv-yellow { background-color: var(--c-yellow); } #tv-yellow.highlight { box-shadow: 0 0 60px var(--c-yellow), inset 0 0 30px white; }
        #tv-blue { background-color: var(--c-blue); } #tv-blue.highlight { box-shadow: 0 0 60px var(--c-blue), inset 0 0 30px white; }
        
        #center-counter { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 6rem; font-weight: bold; color: white; text-shadow: 0 0 30px rgba(0,0,0,0.9); z-index: 10; display: none; pointer-events: none; }

        /* FACTS */
        #fact-container { background: var(--c-red); padding: 60px; border-radius: 30px; max-width: 80%; z-index: 50; display: none; color: black; text-align: left; }
        #fact-text { font-size: 3.5rem; line-height: 1.2; font-weight: bold; margin-bottom: 40px; }
        #tv-timer-container { display: flex; justify-content: flex-end; }
        #tv-timer { font-size: 4rem; font-weight: 900; background: white; border-radius: 20px; border: 4px solid black; padding: 10px 40px; }
        
        /* DATA SCREENS */
        .data-screen { background: black; color: white; width: 100%; height: 100%; align-items: flex-start; padding-left: 10%; }
        .data-row { font-size: 2.5rem; margin: 20px 0; font-weight: bold; text-align: left; }
        .data-row span { color: #888; font-size: 2rem; display: block; font-weight: normal; margin-top: 5px;}

        /* SCOREBOARD (Ajustado para centrar contenido) */
        #scoreboard-container { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(2, 1fr); gap: 2px; background-color: var(--c-red); width: 100%; height: 70vh; margin-top: 20px;}
        .sb-cell { background-color: black; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .sb-number { font-size: 5rem; font-weight: 900; margin: 0; }
        .sb-name { font-size: 1.5rem; color: white; margin-top: 10px; }

        /* OVERLAY AUDIO */
        #audio-overlay { position: fixed; top:0; left:0; width: 100vw; height: 100vh; background: black; z-index: 9999; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

    <audio id="snd-bg" src="sounds/waiting_room_song.mp3" loop preload="auto"></audio>
    <audio id="snd-color" src="sounds/sound_1.mp3" preload="auto"></audio>
    <audio id="snd-start" src="sounds/sound_2.mp3" preload="auto"></audio>
    <audio id="snd-fact" src="sounds/sound_4.mp3" preload="auto"></audio>

    <div id="audio-overlay" onclick="initExperience()">
        <h1 style="color: white; border: 2px solid white; padding: 20px; border-radius: 20px;">CLICK HERE ONCE TO ACTIVATE SCREEN</h1>
    </div>

    <div id="screen-idle" class="screen">
        <h1 class="title-text">ATTENTION TEST</h1>
        <p class="subtitle-text">SCAN TO START</p>
        <div class="bouncing-arrow">↓</div>
    </div>

    <div id="screen-ready" class="screen" style="background: black;">
        <p class="subtitle-text" id="tv-player-name" style="margin-bottom: 0;">PLAYER</p>
        <h1 class="title-text" id="text-player-ready">IS READY TO PLAY</h1>
    </div>

    <div id="screen-game" class="screen" style="background: black; flex-direction: row;">
        <div id="simon-board">
            <div id="tv-green" class="simon-color"></div>
            <div id="tv-red" class="simon-color"></div>
            <div id="tv-yellow" class="simon-color"></div>
            <div id="tv-blue" class="simon-color"></div>
            <div id="center-counter">0</div>
        </div>
        <div id="fact-container">
            <div id="fact-text">Did you know?</div>
            <div id="tv-timer-container"><div id="tv-timer">5</div></div>
        </div>
    </div>

    <div id="screen-gameover" class="screen data-screen">
        <h1 style="color: var(--c-red); font-size: 5rem; margin-bottom: 40px; margin-top: 0;">YOU<br>LOSE</h1>
        <div class="data-row">ATTENTION TIME<br><span id="res-time">0:00 minutes</span></div>
        <div class="data-row">COLORS MEMORIZED<br><span id="res-colors">0 colors, good job!</span></div>
        <div class="data-row">FACTS READED<br><span id="res-facts">0 facts, interesting?</span></div>
        <div class="data-row">AVERAGE SCORE<br><span>5 colors, you're locked in!</span></div>
    </div>

    <div id="screen-scoreboard" class="screen data-screen" style="padding: 50px;">
        <div id="scoreboard-container">
            </div>
    </div>

    <div id="screen-extrainfo" class="screen data-screen" style="align-items: center; justify-content: center; padding: 0;">
        <img id="chart-img" src="charts/chart_1.svg" alt="Extra Info Chart" onerror="this.style.display='none'" style="max-width: 90vw; max-height: 90vh;">
    </div>

    <script>
        const sndBg = document.getElementById('snd-bg');
        const sndColor = document.getElementById('snd-color');
        const sndStart = document.getElementById('snd-start');
        const sndFact = document.getElementById('snd-fact');

        function initExperience() {
            document.getElementById('audio-overlay').style.display = 'none';
            sndBg.play().catch(e => console.log("Audio play falló", e));
            showScreen('screen-idle');
        }

        const colors = ['#1ad872', '#f9432d', '#efd828', '#27a4e4'];
        let colorIdx = 0;
        
        setInterval(() => {
            colorIdx = (colorIdx + 1) % colors.length;
            const c = colors[colorIdx];
            
            if(document.getElementById('screen-idle').classList.contains('active')) {
                document.body.style.backgroundColor = c;
            } else {
                document.body.style.backgroundColor = 'black';
            }
            
            document.getElementById('text-player-ready').style.color = c;
        }, 2000);

        const supabaseUrl = "https://hpmmzyfxchqlazxkbrym.supabase.co";
        const supabaseKey = "sb_publishable_z7XELKJhbVvNwnB1iIJq9g_7-CvO-rb";
        const clienteSupabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        const channel = clienteSupabase.channel("simon-sync").subscribe();

        const facts = [
            "Avondale Middle School recorded a 68% reduction in physical fighting after removing phones.",
            "Removing phones is equivalent to adding 5 extra days of learning to the school year.",
            "Michigan high school students receive an average of 100 notifications daily.",
            "It can take a student 20 minutes to refocus on learning after checking a single message."
        ];
        
        let activePlayer = null; 
        let queue = []; 
        let sequence = [];
        let playerStep = 0;
        let level = 0;
        let factsSeen = 0;
        let startTime = 0;
        let isPlaying = false;
        let lastColorHex = '#f9432d';
        const colorIds = { '#1ad872': 'tv-green', '#f9432d': 'tv-red', '#efd828': 'tv-yellow', '#27a4e4': 'tv-blue' };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            if(id === 'screen-game') {
                document.getElementById('simon-board').style.display = 'grid';
            } else {
                document.getElementById('simon-board').style.display = 'none';
            }
        }

        channel.on("broadcast", { event: "mobile-action" }, (data) => {
            const action = data.payload.action;
            const value = data.payload.value;
            const senderId = data.payload.id;

            if (action === "JOIN") {
                if (!activePlayer) {
                    activePlayer = { id: senderId, name: value };
                    sndBg.pause();
                    document.getElementById('tv-player-name').innerText = value.toUpperCase();
                    showScreen('screen-ready'); 
                    channel.send({ type: "broadcast", event: "tv-state", payload: { state: "ACCEPTED", targetId: senderId } });
                } else {
                    queue.push({ id: senderId, name: value });
                    channel.send({ type: "broadcast", event: "tv-state", payload: { state: "PLAYER_QUEUED", targetId: senderId, position: queue.length } });
                }
            } 
            else if (activePlayer && senderId === activePlayer.id) {
                if (action === "START" || action === "TRY_AGAIN") {
                    sndStart.currentTime = 0; sndStart.play().catch(e=>{});
                    startGame();
                } else if (action === "TAP" && isPlaying) {
                    checkPlayerInput(value);
                } else if (action === "SCOREBOARD_REQ") {
                    renderScoreboard();
                } else if (action === "EXTRA_INFO_REQ") {
                    document.getElementById('chart-img').src = `charts/chart_${Math.floor(Math.random()*3)+1}.svg`;
                    showScreen('screen-extrainfo');
                } else if (action === "EXIT") {
                    resetTVToIdle();
                }
            }
            else if (action === "EXIT") {
                const qIndex = queue.findIndex(p => p.id === senderId);
                if (qIndex > -1) {
                    queue.splice(qIndex, 1);
                    queue.forEach((p, idx) => {
                        channel.send({ type: "broadcast", event: "tv-state", payload: { state: "QUEUE_UPDATE", targetId: p.id, position: idx + 1 } });
                    });
                }
            }
        });

        // NUEVO: Función que carga nombres reales desde Supabase y los centra
        async function renderScoreboard() {
            const { data } = await clienteSupabase.from('scores').select('*').order('score', { ascending: false }).limit(10);
            const grid = document.getElementById('scoreboard-container');
            let html = '';
            
            for (let i = 0; i < 10; i++) {
                const player = data && data[i] ? data[i] : { nickname: '---' };
                let color = 'white';
                if (i === 0) color = 'var(--c-green)';
                if (i === 1) color = 'var(--c-yellow)';
                if (i === 2) color = 'var(--c-blue)';
                
                html += `
                    <div class="sb-cell">
                        <h2 class="sb-number" style="color: ${color}">#${i+1}</h2>
                        <p class="sb-name">${player.nickname}</p>
                    </div>
                `;
            }
            grid.innerHTML = html;
            showScreen('screen-scoreboard');
        }

        function resetTVToIdle() {
            isPlaying = false;
            document.getElementById('simon-board').style.display = 'none';
            document.getElementById('fact-container').style.display = 'none';
            
            if (queue.length > 0) {
                activePlayer = queue.shift();
                document.getElementById('tv-player-name').innerText = activePlayer.name.toUpperCase();
                showScreen('screen-ready'); 
                channel.send({ type: "broadcast", event: "tv-state", payload: { state: "ACCEPTED", targetId: activePlayer.id } });
                
                queue.forEach((p, idx) => {
                    channel.send({ type: "broadcast", event: "tv-state", payload: { state: "QUEUE_UPDATE", targetId: p.id, position: idx + 1 } });
                });
            } else {
                activePlayer = null;
                showScreen('screen-idle');
                sndBg.currentTime = 0;
                sndBg.play().catch(e=>{});
            }
        }

        function startGame() {
            showScreen('screen-game');
            sequence = []; level = 0; factsSeen = 0; startTime = Date.now();
            document.getElementById('center-counter').style.display = 'none';
            setTimeout(nextRound, 2000);
        }

        function nextRound() {
            level++; playerStep = 0;
            const nextHex = colors[Math.floor(Math.random() * colors.length)];
            sequence.push(nextHex);
            lastColorHex = nextHex; 
            isPlaying = false;
            document.getElementById('center-counter').style.display = 'none';

            let showFact = (level > 1 && level <= 6) || (level > 6 && level % 5 === 0);

            if (showFact) {
                factsSeen++;
                displayFactAndBlock();
            } else {
                setTimeout(playSequence, 500);
            }
        }

        function displayFactAndBlock() {
            const factBox = document.getElementById("fact-container");
            const timerText = document.getElementById("tv-timer");
            
            factBox.style.backgroundColor = lastColorHex;
            document.getElementById("fact-text").innerText = facts[Math.floor(Math.random() * facts.length)];
            
            document.getElementById('simon-board').style.display = 'none';
            factBox.style.display = "block";
            
            sndFact.currentTime = 0; sndFact.play().catch(e=>{});

            channel.send({ type: "broadcast", event: "tv-state", payload: { state: "BLOCKED", targetId: activePlayer.id } });

            let timeLeft = 5; timerText.innerText = timeLeft;
            const timer = setInterval(() => {
                timeLeft--; timerText.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    factBox.style.display = "none";
                    document.getElementById('simon-board').style.display = 'grid';
                    playSequence();
                }
            }, 1000);
        }

        function playSequence() {
            channel.send({ type: "broadcast", event: "tv-state", payload: { state: "WATCH", targetId: activePlayer.id } });
            let i = 0;
            const interval = setInterval(() => {
                highlightColor(sequence[i]);
                i++;
                if (i >= sequence.length) {
                    clearInterval(interval);
                    setTimeout(() => {
                        isPlaying = true;
                        document.getElementById('center-counter').innerText = sequence.length;
                        document.getElementById('center-counter').style.display = 'block';
                        channel.send({ type: "broadcast", event: "tv-state", payload: { state: "PLAY", targetId: activePlayer.id } });
                    }, 500);
                }
            }, 800); 
        }

        function highlightColor(hex) {
            const el = document.getElementById(colorIds[hex]);
            sndColor.currentTime = 0; sndColor.play().catch(e=>{}); 
            el.classList.add("highlight");
            setTimeout(() => el.classList.remove("highlight"), 300); 
        }

        function checkPlayerInput(colorTapped) {
            highlightColor(colorTapped);
            if (colorTapped === sequence[playerStep]) {
                playerStep++;
                document.getElementById('center-counter').innerText = sequence.length - playerStep;
                
                if (playerStep === sequence.length) {
                    isPlaying = false;
                    document.getElementById('center-counter').style.display = 'none';
                    setTimeout(nextRound, 800); 
                }
            } else {
                gameOver();
            }
        }

        function gameOver() {
            isPlaying = false;
            const totalSecs = Math.floor((Date.now() - startTime) / 1000);
            const mins = Math.floor(totalSecs / 60);
            const secs = totalSecs % 60;
            const finalScore = level - 1;
            
            document.getElementById("res-time").innerText = `${mins}:${secs < 10 ? '0' : ''}${secs} minutes`;
            document.getElementById("res-colors").innerText = `${finalScore} colors, good job!`;
            document.getElementById("res-facts").innerText = `${factsSeen} facts, interesting?`;

            showScreen('screen-gameover');

            // NUEVO: Calcular la posición dinámica basada en la base de datos
            (async () => {
                // Guarda la puntuación actual
                await clienteSupabase.from('scores').insert([{ nickname: activePlayer.name, score: finalScore }]);
                
                // Cuenta cuántos usuarios tienen mejor puntuación
                const { count, error } = await clienteSupabase.from('scores')
                    .select('*', { count: 'exact', head: true })
                    .gt('score', finalScore);
                
                const rank = error ? '--' : (count || 0) + 1;
                channel.send({ type: "broadcast", event: "tv-state", payload: { state: "GAMEOVER", targetId: activePlayer.id, rank: rank } });
            })();
        }
    </script>
</body>
</html>
