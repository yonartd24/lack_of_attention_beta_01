<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV - Brain Drain</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --c-green: #1ad872; --c-red: #f9432d; --c-yellow: #efd828; --c-blue: #27a4e4;
        }
        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; background-color: #1a1a1a; color: white; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; transition: background-color 0.5s; }
        .screen { display: none; width: 100%; height: 100%; padding: 50px; box-sizing: border-box; flex-direction: column; justify-content: center; align-items: center; }
        .active { display: flex; }
        
        /* Ajusta la posición de los textos aquí */
        .title-text { font-size: 6rem; margin: 0; font-weight: 900; text-transform: uppercase; text-align: center; }
        .subtitle-text { font-size: 3rem; margin-top: 10px; font-weight: bold; text-align: center; }
        
        .bouncing-arrow { font-size: 5rem; animation: bounce 1.5s ease-in-out infinite; margin-top: 40px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(30px); } }

        #simon-board { display: none; grid-template-columns: 1fr 1fr; width: 80vh; height: 80vh; gap: 20px; position: relative; }
        .simon-color { border-radius: 30px; opacity: 0.2; transition: all 0.2s ease; }
        .simon-color.highlight { opacity: 1; transform: scale(1.02); }
        
        #tv-green { background-color: var(--c-green); } #tv-green.highlight { box-shadow: 0 0 60px var(--c-green); }
        #tv-red { background-color: var(--c-red); } #tv-red.highlight { box-shadow: 0 0 60px var(--c-red); }
        #tv-yellow { background-color: var(--c-yellow); } #tv-yellow.highlight { box-shadow: 0 0 60px var(--c-yellow); }
        #tv-blue { background-color: var(--c-blue); } #tv-blue.highlight { box-shadow: 0 0 60px var(--c-blue); }
        
        #center-counter { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 6rem; font-weight: bold; color: white; text-shadow: 0 0 30px rgba(0,0,0,0.9); z-index: 10; display: none; }

        /* Scoreboard Centrado */
        #scoreboard-container { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(2, 1fr); gap: 2px; background-color: var(--c-red); width: 100%; height: 70vh; margin-top: 20px;}
        .sb-cell { background-color: black; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        .sb-number { font-size: 5rem; font-weight: 900; margin: 0; }
        .sb-name { font-size: 1.5rem; color: white; margin-top: 10px; text-transform: uppercase; }

        #audio-overlay { position: fixed; top:0; left:0; width: 100vw; height: 100vh; background: black; z-index: 9999; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

    <audio id="snd-bg" src="sounds/waiting_room_song.mp3" loop preload="auto"></audio>
    <audio id="snd-color" src="sounds/sound_1.mp3" preload="auto"></audio>
    <audio id="snd-start" src="sounds/sound_2.mp3" preload="auto"></audio>
    <audio id="snd-fact" src="sounds/sound_4.mp3" preload="auto"></audio>

    <div id="audio-overlay" onclick="initExperience()">
        <h1 style="color: white; border: 2px solid white; padding: 20px; border-radius: 20px;">CLICK ONCE TO ACTIVATE</h1>
    </div>

    <div id="screen-idle" class="screen">
        <h1 class="title-text">ATTENTION TEST</h1>
        <p class="subtitle-text">SCAN TO START</p>
        <div class="bouncing-arrow">↓</div>
    </div>

    <div id="screen-ready" class="screen" style="background: black;">
        <p class="subtitle-text" id="tv-player-name" style="margin-bottom: 0;">PLAYER</p>
        <h1 class="title-text" id="text-player-ready">IS READY TO PLAY</h1>
    </div>

    <div id="screen-game" class="screen" style="background: black;">
        <div id="simon-board">
            <div id="tv-green" class="simon-color"></div>
            <div id="tv-red" class="simon-color"></div>
            <div id="tv-yellow" class="simon-color"></div>
            <div id="tv-blue" class="simon-color"></div>
            <div id="center-counter">0</div>
        </div>
    </div>

    <div id="screen-gameover" class="screen" style="background: black; align-items: flex-start; padding-left: 10%;">
        <h1 style="color: var(--c-red); font-size: 5rem; margin-bottom: 40px; text-align: left;">YOU<br>LOSE</h1>
        <p class="subtitle-text" style="text-align: left;">COLORS MEMORIZED: <span id="res-colors">0</span></p>
    </div>

    <div id="screen-scoreboard" class="screen" style="background: black; padding: 50px;">
        <div id="scoreboard-container"></div>
    </div>

    <script>
        const sndBg = document.getElementById('snd-bg');
        const sndColor = document.getElementById('snd-color');
        const sndStart = document.getElementById('snd-start');

        const supabaseUrl = "https://hpmmzyfxchqlazxkbrym.supabase.co";
        const supabaseKey = "sb_publishable_z7XELKJhbVvNwnB1iIJq9g_7-CvO-rb";
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        const channel = supabase.channel("simon-sync").subscribe();

        let activePlayer = null;
        let queue = [];
        const colors = ['#1ad872', '#f9432d', '#efd828', '#27a4e4'];
        let colorIdx = 0;

        function initExperience() {
            document.getElementById('audio-overlay').style.display = 'none';
            sndBg.play();
            showScreen('screen-idle');
        }

        setInterval(() => {
            colorIdx = (colorIdx + 1) % colors.length;
            const c = colors[colorIdx];
            if(document.getElementById('screen-idle').classList.contains('active')) {
                document.body.style.backgroundColor = c;
            } else {
                document.body.style.backgroundColor = 'black';
            }
            document.getElementById('text-player-ready').style.color = c;
        }, 2000);

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('simon-board').style.display = (id === 'screen-game') ? 'grid' : 'none';
        }

        channel.on("broadcast", { event: "mobile-action" }, (data) => {
            const { action, value, id } = data.payload;
            if (action === "JOIN") {
                if (!activePlayer) {
                    activePlayer = { id, name: value };
                    sndBg.pause();
                    document.getElementById('tv-player-name').innerText = value.toUpperCase();
                    showScreen('screen-ready');
                    channel.send({ type: "broadcast", event: "tv-state", payload: { state: "ACCEPTED", targetId: id } });
                } else {
                    queue.push({ id, name: value });
                    channel.send({ type: "broadcast", event: "tv-state", payload: { state: "QUEUED", targetId: id, pos: queue.length } });
                }
            } else if (activePlayer && id === activePlayer.id) {
                if (action === "START") { sndStart.play(); startGame(); }
                if (action === "SCOREBOARD_REQ") renderScoreboard();
                if (action === "EXIT") resetTV();
            }
        });

        async function renderScoreboard() {
            const { data } = await supabase.from('scores').select('*').order('score', { ascending: false }).limit(10);
            const grid = document.getElementById('scoreboard-container');
            const topColors = ['var(--c-green)', 'var(--c-yellow)', 'var(--c-blue)'];
            grid.innerHTML = Array.from({ length: 10 }, (_, i) => {
                const p = data?.[i] || { nickname: '---' };
                return `<div class="sb-cell"><h2 class="sb-number" style="color: ${i < 3 ? topColors[i] : 'white'}">#${i+1}</h2><p class="sb-name">${p.nickname}</p></div>`;
            }).join('');
            showScreen('screen-scoreboard');
        }

        function resetTV() {
            if (queue.length > 0) {
                activePlayer = queue.shift();
                document.getElementById('tv-player-name').innerText = activePlayer.name.toUpperCase();
                showScreen('screen-ready');
                channel.send({ type: "broadcast", event: "tv-state", payload: { state: "ACCEPTED", targetId: activePlayer.id } });
            } else {
                activePlayer = null;
                showScreen('screen-idle');
                sndBg.play();
            }
        }
        // ... Lógica de juego simplificada ...
    </script>
</body>
</html>
