<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TV - Brain Drain</title>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <style>
            body {
                margin: 0;
                font-family: "Helvetica Neue", Arial, sans-serif;
                background-color: #1a1a1a;
                color: white;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                transition: background-color 0.2s;
            }

            .screen {
                display: none;
                text-align: center;
                width: 100%;
                padding: 20px;
                box-sizing: border-box;
            }
            .active {
                display: block;
            }

            h1 {
                font-size: 4rem;
                margin-bottom: 10px;
            }
            p {
                font-size: 1.5rem;
                color: #aaa;
            }

            /* Juego Simon */
            #simon-board {
                display: grid;
                grid-template-columns: 1fr 1fr;
                width: 80vh;
                height: 80vh;
                gap: 10px;
                margin: 0 auto;
                display: none;
            }
            .simon-color {
                border-radius: 20px;
                opacity: 0.3;
                transition: opacity 0.2s;
            }
            .simon-color.highlight {
                opacity: 1;
                box-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
            }

            /* Datos de Investigación */
            #fact-container {
                position: absolute;
                background: rgba(0, 0, 0, 0.9);
                padding: 40px;
                border-radius: 20px;
                border: 2px solid white;
                max-width: 60%;
                z-index: 50;
                display: none;
            }
            #fact-text {
                font-size: 2.5rem;
                line-height: 1.4;
                margin-bottom: 20px;
            }
            #tv-timer {
                font-size: 4rem;
                font-weight: bold;
                color: #ff3b30;
            }

            /* Notificaciones (Distracciones) */
            .notification {
                position: absolute;
                padding: 15px 25px;
                border-radius: 15px;
                font-weight: bold;
                font-size: 1.2rem;
                color: white;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
                z-index: 100;
                animation: float 3s infinite alternate;
                pointer-events: none;
            }
            @keyframes float {
                from {
                    transform: translateY(0);
                }
                to {
                    transform: translateY(-20px);
                }
            }
        </style>
    </head>
    <body>
        <div id="screen-wait" class="screen active">
            <h1>⬅️ SCAN TO PLAY</h1>
            <p>Is your attention for sale?</p>
            <p id="tv-status" style="color: #00ff00; font-family: monospace; font-size: 1rem; margin-top: 20px">
                Esperando conexión al servidor...
            </p>
        </div>

        <div id="simon-board">
            <div id="tv-green" class="simon-color" style="background: #34c759"></div>
            <div id="tv-red" class="simon-color" style="background: #ff3b30"></div>
            <div id="tv-yellow" class="simon-color" style="background: #ffcc00"></div>
            <div id="tv-blue" class="simon-color" style="background: #007aff"></div>
        </div>

        <div id="fact-container">
            <div id="fact-text">Did you know?</div>
            <div id="tv-timer">10</div>
        </div>

        <div id="screen-gameover" class="screen">
            <h1 style="color: #ff3b30">ATTENTION DRAINED</h1>
            <div style="font-size: 2rem; margin-top: 30px">
                <p>Time Focused: <span id="res-time" style="color: white">0</span>s</p>
                <p>Colors Memorized: <span id="res-colors" style="color: white">0</span></p>
                <p>Facts Learned: <span id="res-facts" style="color: white">0</span></p>
            </div>
            <p style="margin-top: 40px; font-size: 1.2rem">Check your phone to continue</p>
        </div>

        <script>
            const supabaseUrl = "https://hpmmzyfxchqlazxkbrym.supabase.co";
            const supabaseKey = "sb_publishable_z7XELKJhbVvNwnB1iIJq9g_7-CvO-rb";
            const clienteSupabase = window.supabase.createClient(supabaseUrl, supabaseKey);
            const channel = clienteSupabase.channel("simon-sync");

            const facts = [
                "Michigan schools saw a 68% drop in fights after the ban.",
                "Removing phones added 5 equivalent days of learning per year.",
                "Constant notifications reduce working memory capacity by 20%.",
                "Students take 20 minutes to refocus after checking a single message.",
                "Schools with strict phone bans report 40% less bullying.",
                "Screen time during class correlates with lower GPA scores globally.",
                "The mere presence of a smartphone on a desk reduces cognitive capacity."
            ];

            let sequence = [];
            let playerStep = 0;
            let level = 0;
            let factsSeen = 0;
            let startTime = 0;
            let isPlaying = false;
            let distractionInterval;
            const colors = ["#34C759", "#FF3B30", "#FFCC00", "#007AFF"];
            const colorIds = {
                "#34C759": "tv-green",
                "#FF3B30": "tv-red",
                "#FFCC00": "tv-yellow",
                "#007AFF": "tv-blue"
            };

            channel.subscribe((status) => {
                if (status === "SUBSCRIBED") {
                    document.getElementById("tv-status").innerText = "Sistema Online. Listo para sincronizar.";
                }
            });

            channel.on("broadcast", { event: "mobile-action" }, (data) => {
                const action = data.payload.action;
                const value = data.payload.value;

                if (action === "JOIN") {
                    document.getElementById("screen-wait").innerHTML =
                        `<h1>${value} IS READY</h1><p>Look at your phone to start</p>`;
                } else if (action === "START") {
                    startGame();
                } else if (action === "TAP" && isPlaying) {
                    checkPlayerInput(value);
                } else if (action === "EXIT") {
                    location.reload();
                }
            });

            function startGame() {
                document.getElementById("screen-wait").classList.remove("active");
                document.getElementById("screen-gameover").classList.remove("active");
                document.getElementById("simon-board").style.display = "grid";

                sequence = [];
                level = 0;
                factsSeen = 0;
                startTime = Date.now();
                nextRound();
            }

            function nextRound() {
                level++;
                playerStep = 0;
                sequence.push(colors[Math.floor(Math.random() * colors.length)]);
                isPlaying = false;

                // Lógica de aparición de datos (cada vez hasta el 10, luego cada 5)
                let showFact = false;
                if (level <= 10) showFact = true;
                else if (level % 5 === 0) showFact = true;

                if (showFact) {
                    factsSeen++;
                    displayFactAndBlock();
                } else {
                    setTimeout(playSequence, 1000);
                }

                // Distracciones a partir del nivel 5
                if (level === 5 && !distractionInterval) {
                    distractionInterval = setInterval(spawnDistraction, 3000);
                }
            }

            function displayFactAndBlock() {
                const factBox = document.getElementById("fact-container");
                const timerText = document.getElementById("tv-timer");

                document.getElementById("fact-text").innerText = facts[(factsSeen - 1) % facts.length];
                factBox.style.display = "block";

                // Bloqueamos el móvil
                channel.send({ type: "broadcast", event: "tv-state", payload: { state: "BLOCKED" } });

                let timeLeft = 10;
                timerText.innerText = timeLeft;

                const timer = setInterval(() => {
                    timeLeft--;
                    timerText.innerText = timeLeft;
                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        factBox.style.display = "none";
                        playSequence();
                    }
                }, 1000);
            }

            function playSequence() {
                // Decimos al móvil que mire la TV
                channel.send({ type: "broadcast", event: "tv-state", payload: { state: "WATCH" } });
                let i = 0;
                const interval = setInterval(() => {
                    highlightColor(sequence[i]);
                    i++;
                    if (i >= sequence.length) {
                        clearInterval(interval);
                        setTimeout(() => {
                            isPlaying = true;
                            // Desbloqueamos el móvil para jugar
                            channel.send({ type: "broadcast", event: "tv-state", payload: { state: "PLAY" } });
                        }, 500);
                    }
                }, 800);
            }

            function highlightColor(hex) {
                const el = document.getElementById(colorIds[hex]);
                el.classList.add("highlight");
                setTimeout(() => el.classList.remove("highlight"), 400);
            }

            function checkPlayerInput(colorTapped) {
                highlightColor(colorTapped);
                if (colorTapped === sequence[playerStep]) {
                    playerStep++;
                    if (playerStep === sequence.length) {
                        isPlaying = false;
                        setTimeout(nextRound, 1000);
                    }
                } else {
                    gameOver();
                }
            }

            function spawnDistraction() {
                if (!isPlaying) return;

                // SISTEMA ANTI-LAG: Si ya hay 4 notificaciones en pantalla, no creamos más para no saturar la memoria
                const currentNotifs = document.querySelectorAll(".notification");
                if (currentNotifs.length > 3) return;

                const notif = document.createElement("div");
                notif.className = "notification";
                notif.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                notif.style.top = Math.random() * 80 + "%";
                notif.style.left = Math.random() * 80 + "%";

                const texts = ["New Like!", "Trending Topic", "Missed Call", "Message from Vanesa", "Battery Low"];
                notif.innerText = texts[Math.floor(Math.random() * texts.length)];

                document.body.appendChild(notif);

                // Las destruimos a los 3 segundos en lugar de 4 para limpiar la memoria más rápido
                setTimeout(() => notif.remove(), 3000);
            }

            function gameOver() {
                isPlaying = false;
                clearInterval(distractionInterval);
                document.querySelectorAll(".notification").forEach((e) => e.remove());

                const totalTime = Math.floor((Date.now() - startTime) / 1000);

                document.getElementById("simon-board").style.display = "none";
                document.getElementById("screen-gameover").classList.add("active");

                document.getElementById("res-time").innerText = totalTime;
                document.getElementById("res-colors").innerText = level - 1;
                document.getElementById("res-facts").innerText = factsSeen;

                channel.send({ type: "broadcast", event: "tv-state", payload: { state: "GAMEOVER" } });
            }
        </script>
    </body>
</html>
